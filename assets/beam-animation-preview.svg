<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" width="1536" height="1024">
  <defs>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1536" height="1024" rx="44" ry="44" />
    </clipPath>
    <filter id="beamBlurLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <filter id="beamBlurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <filter id="nodeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="beamBase" x1="430" y1="250" x2="1012" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eefbff" stop-opacity="0.2" />
      <stop offset="25%" stop-color="#d9f6ff" stop-opacity="0.72" />
      <stop offset="70%" stop-color="#8fd9ff" stop-opacity="0.58" />
      <stop offset="100%" stop-color="#dff8ff" stop-opacity="0.18" />
    </linearGradient>
    <linearGradient id="beamCore" x1="430" y1="250" x2="1012" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="38%" stop-color="#dff7ff" stop-opacity="1" />
      <stop offset="72%" stop-color="#86d7ff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#eafcff" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="beamSweep" x1="430" y1="250" x2="1012" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="sourceFlare" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="55%" stop-color="#7ad6ff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#7ad6ff" stop-opacity="0" />
    </radialGradient>
    <style>
      .beam-pulse {
        animation: beamPulse 2.2s ease-in-out infinite;
        transform-origin: 721px 512px;
      }
      .beam-run {
        stroke-dasharray: 220 1200;
        animation: beamRun 1.8s linear infinite;
      }
      .glow-ping {
        animation: ping 2s ease-out infinite;
      }
      .glow-ping.delay {
        animation-delay: -1s;
      }
      .source-spark {
        animation: sourceSpark 1.6s ease-in-out infinite;
      }
      @keyframes beamPulse {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; }
      }
      @keyframes beamRun {
        from { stroke-dashoffset: 1320; }
        to { stroke-dashoffset: 0; }
      }
      @keyframes ping {
        0% { opacity: 0.7; transform: scale(0.72); }
        100% { opacity: 0; transform: scale(1.75); }
      }
      @keyframes sourceSpark {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <g clip-path="url(#cardClip)">
    <image href="Satelite%20Image.png" x="0" y="0" width="1536" height="1024" preserveAspectRatio="xMidYMid slice" />

    <g class="beam-pulse" style="mix-blend-mode:screen">
      <line x1="430" y1="250" x2="1012" y2="774" stroke="url(#beamBase)" stroke-width="92" stroke-linecap="round" filter="url(#beamBlurLarge)" opacity="0.8" />
      <line x1="430" y1="250" x2="1012" y2="774" stroke="url(#beamCore)" stroke-width="38" stroke-linecap="round" filter="url(#beamBlurSoft)" opacity="0.98" />
      <line x1="430" y1="250" x2="1012" y2="774" stroke="url(#beamCore)" stroke-width="16" stroke-linecap="round" opacity="1" />
      <line class="beam-run" x1="430" y1="250" x2="1012" y2="774" stroke="url(#beamSweep)" stroke-width="52" stroke-linecap="round" opacity="0.95" filter="url(#beamBlurSoft)" />
    </g>

    <g filter="url(#nodeGlow)">
      <circle class="glow-ping" cx="430" cy="250" r="34" fill="url(#sourceFlare)" />
      <circle class="glow-ping delay" cx="1012" cy="774" r="30" fill="url(#sourceFlare)" />
      <circle class="source-spark" cx="430" cy="250" r="18" fill="#ffffff" opacity="0.92" />
      <circle class="source-spark" cx="1012" cy="774" r="14" fill="#dff7ff" opacity="0.88" />
    </g>
  </g>
</svg>
