<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerNet Beam Concept Preview</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 12%, rgba(80, 168, 255, 0.18), transparent 22%),
          radial-gradient(circle at 82% 14%, rgba(239, 127, 26, 0.16), transparent 24%),
          linear-gradient(180deg, #08111d 0%, #071321 48%, #040910 100%);
      }

      .preview-shell {
        width: min(1240px, 100%);
      }

      .preview-kicker {
        margin: 0 0 10px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .preview-frame {
        overflow: hidden;
        border-radius: 32px;
        border: 1px solid rgba(122, 202, 255, 0.14);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.42);
        background: #040910;
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .beam-glow {
        animation: beamPulse 2.2s ease-in-out infinite;
      }

      .beam-core {
        animation: beamPulse 1.7s ease-in-out infinite;
      }

      .beam-trace {
        stroke-dasharray: 180 1500;
        animation: beamTravel 1.5s linear infinite;
      }

      .beam-trace-secondary {
        stroke-dasharray: 100 1580;
        animation: beamTravel 1.5s linear infinite -0.75s;
      }

      .source-flare {
        animation: sourceBlink 1.6s ease-in-out infinite;
      }

      .target-ring {
        transform-origin: 1110px 725px;
        animation: ringExpand 2s ease-out infinite;
      }

      .target-ring.delay {
        animation-delay: 1s;
      }

      .dish-glow {
        animation: dishBlink 1.6s ease-in-out infinite 0.25s;
      }

      .satellite-drift {
        transform-origin: 265px 190px;
        animation: satelliteFloat 6s ease-in-out infinite;
      }

      .stars-near {
        animation: starTwinkle 3.2s ease-in-out infinite;
      }

      .stars-far {
        animation: starTwinkle 4.6s ease-in-out infinite -1.2s;
      }

      .cloud-drift {
        animation: cloudDrift 18s ease-in-out infinite alternate;
      }

      @keyframes beamPulse {
        0%, 100% {
          opacity: 0.84;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes beamTravel {
        from {
          stroke-dashoffset: 1680;
          opacity: 0;
        }
        8% {
          opacity: 1;
        }
        92% {
          opacity: 1;
        }
        to {
          stroke-dashoffset: 0;
          opacity: 0;
        }
      }

      @keyframes sourceBlink {
        0%, 100% {
          opacity: 0.72;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes ringExpand {
        0% {
          opacity: 0.72;
          transform: scale(0.78);
        }
        100% {
          opacity: 0;
          transform: scale(1.7);
        }
      }

      @keyframes dishBlink {
        0%, 100% {
          opacity: 0.38;
        }
        50% {
          opacity: 0.88;
        }
      }

      @keyframes satelliteFloat {
        0%, 100% {
          transform: translateY(0px) rotate(-12deg);
        }
        50% {
          transform: translateY(-8px) rotate(-11deg);
        }
      }

      @keyframes starTwinkle {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes cloudDrift {
        0% {
          transform: translateX(0px);
        }
        100% {
          transform: translateX(18px);
        }
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <p class="preview-kicker">Standalone Beam Concept Preview</p>
      <div class="preview-frame">

            <linearGradient id="cloudStroke" x1="0" y1="0" x2="1" y2="0">

              <stop offset="20%" stop-color="rgba(210,235,255,0.38)" />
              <stop offset="70%" stop-color="rgba(194,229,255,0.2)" />

            <linearGradient id="beamStroke" x1="455" y1="190" x2="1110" y2="725" gradientUnits="userSpaceOnUse">

              <stop offset="64%" stop-color="#7fd4ff" stop-opacity="0.56" />

            <linearGradient id="panelGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#112f5f" />
              <stop offset="100%" stop-color="#1f4f9a" />
            </linearGradient>
            <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">

            <filter id="beamBlur" x="-20%" y="-20%" width="140%" height="140%">

            <filter id="smallGlow" x="-60%" y="-60%" width="220%" height="220%">

            </filter>
            <clipPath id="earthClip">
              <ellipse cx="920" cy="940" rx="980" ry="470" />
            </clipPath>
            <path id="beamPath" d="M455 190 C 630 320, 860 520, 1110 725" />
          </defs>

          <rect width="1600" height="900" fill="url(#skyGradient)" />
          <rect width="1600" height="900" fill="url(#sunGlow)" />
          <rect width="1600" height="900" fill="url(#skyBloomLeft)" />
          <rect width="1600" height="900" fill="url(#skyBloomRight)" />

          <g class="stars-far" fill="#d9ebff" opacity="0.55">
            <circle cx="82" cy="92" r="1.5" />

            <circle cx="1331" cy="138" r="1.4" />

          <g class="stars-near" fill="#ffffff" opacity="0.86">

                <path d="M1048 694 C 1166 678, 1276 694, 1400 736" fill="none" stroke="url(#cloudStroke)" stroke-width="18" stroke-linecap="round" class="cloud-drift" />
              </g>
            </g>
            <ellipse cx="900" cy="626" rx="860" ry="96" fill="url(#atmosphere)" filter="url(#softBlur)" />
            <ellipse cx="900" cy="631" rx="808" ry="24" fill="url(#atmosphere)" />
            <ellipse cx="900" cy="635" rx="740" ry="8" fill="rgba(228,246,255,0.88)" opacity="0.92" />
          </g>

          <g opacity="0.86" fill="#ffcf84" filter="url(#smallGlow)">
            <circle cx="154" cy="662" r="3.1" />

  </body>
</html>
