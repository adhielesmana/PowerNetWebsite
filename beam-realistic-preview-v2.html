<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PowerNet Realistic Beam Preview V2</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 16%, rgba(81, 171, 255, 0.14), transparent 22%),
          radial-gradient(circle at 82% 18%, rgba(239, 127, 26, 0.12), transparent 24%),
          linear-gradient(180deg, #0a1220 0%, #07111d 100%);
      }

      .preview-shell {
        width: min(1220px, 100%);
      }

      .preview-kicker {
        margin: 0 0 10px;
        color: rgba(255, 255, 255, 0.72);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .preview-frame {
        overflow: hidden;
        border-radius: 32px;
        border: 1px solid rgba(122, 202, 255, 0.16);
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.42);
        background: #050b14;
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .beam-travel {
        stroke-dasharray: 180 1260;
        animation: beamTravel 1.4s linear infinite;
      }

      .beam-travel.secondary {
        stroke-dasharray: 120 1320;
        animation-delay: -0.7s;
      }

      .beam-bloom {
        stroke-dasharray: 220 1240;
        animation: beamTravel 1.4s linear infinite;
      }

      .beam-bloom.secondary {
        stroke-dasharray: 160 1300;
        animation-delay: -0.7s;
      }

      .beam-source,
      .beam-target {
        animation: nodePulse 1.6s ease-in-out infinite;
      }

      .beam-target-ring {
        transform-origin: 1010px 772px;
        animation: ringExpand 2s ease-out infinite;
      }

      .beam-target-ring.delay {
        animation-delay: 0.9s;
      }

      @keyframes beamTravel {
        from {
          stroke-dashoffset: 1480;
          opacity: 0;
        }
        8% {
          opacity: 1;
        }
        92% {
          opacity: 1;
        }
        to {
          stroke-dashoffset: 0;
          opacity: 0;
        }
      }

      @keyframes nodePulse {
        0%, 100% {
          opacity: 0.7;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes ringExpand {
        0% {
          transform: scale(0.76);
          opacity: 0.72;
        }
        100% {
          transform: scale(1.6);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <p class="preview-kicker">Realistic Beam Preview V2</p>
      <div class="preview-frame">
        <svg viewBox="0 0 1536 1024" role="img" aria-label="Realistic preview with the original beam suppressed and only animated transmission pulses visible">
          <defs>
            <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="8" />
            </filter>
            <filter id="wideBlur" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="18" />
            </filter>
            <linearGradient id="beamSuppress" x1="420" y1="238" x2="1010" y2="772" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#071018" stop-opacity="0.98" />
              <stop offset="34%" stop-color="#0b2036" stop-opacity="0.94" />
              <stop offset="70%" stop-color="#0a1322" stop-opacity="0.9" />
              <stop offset="100%" stop-color="#11182a" stop-opacity="0.95" />
            </linearGradient>
          </defs>

          <image href="assets/Satelite%20Image.png" x="0" y="0" width="1536" height="1024" preserveAspectRatio="xMidYMid slice" />

          <g opacity="0.99">
            <line x1="420" y1="238" x2="1010" y2="772" stroke="url(#beamSuppress)" stroke-width="120" stroke-linecap="round" filter="url(#wideBlur)" />
            <line x1="420" y1="238" x2="1010" y2="772" stroke="url(#beamSuppress)" stroke-width="84" stroke-linecap="round" filter="url(#softBlur)" />
            <line x1="420" y1="238" x2="1010" y2="772" stroke="url(#beamSuppress)" stroke-width="56" stroke-linecap="round" />
          </g>

          <g style="mix-blend-mode:screen" opacity="0.98">
            <line x1="420" y1="238" x2="1010" y2="772" stroke="rgba(158,232,255,0.5)" stroke-width="56" stroke-linecap="round" class="beam-bloom" filter="url(#wideBlur)" />
            <line x1="420" y1="238" x2="1010" y2="772" stroke="rgba(255,255,255,0.94)" stroke-width="22" stroke-linecap="round" class="beam-travel" filter="url(#softBlur)" />
            <line x1="420" y1="238" x2="1010" y2="772" stroke="rgba(118,218,255,0.88)" stroke-width="10" stroke-linecap="round" class="beam-travel secondary" filter="url(#softBlur)" />
            <line x1="420" y1="238" x2="1010" y2="772" stroke="rgba(138,225,255,0.34)" stroke-width="34" stroke-linecap="round" class="beam-bloom secondary" filter="url(#wideBlur)" />
          </g>

          <g style="mix-blend-mode:screen">
            <circle cx="420" cy="238" r="28" fill="rgba(191,242,255,0.28)" class="beam-source" filter="url(#softBlur)" />
            <circle cx="420" cy="238" r="10" fill="#ffffff" class="beam-source" />
            <circle cx="1010" cy="772" r="22" fill="rgba(191,242,255,0.22)" class="beam-target" filter="url(#softBlur)" />
            <circle cx="1010" cy="772" r="9" fill="#ebfbff" class="beam-target" />
            <circle cx="1010" cy="772" r="46" fill="none" stroke="rgba(197,242,255,0.46)" stroke-width="4" class="beam-target-ring" />
            <circle cx="1010" cy="772" r="46" fill="none" stroke="rgba(197,242,255,0.34)" stroke-width="4" class="beam-target-ring delay" />
          </g>
        </svg>
      </div>
    </div>
  </body>
</html>
